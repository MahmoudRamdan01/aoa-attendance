    <script>
      // Dark is the product default; apply the saved choice before React to avoid a flash.
      try {
        var t = localStorage.getItem("aol-theme");
        var resolvedTheme = t === "light" ? "light" : "dark";
        document.documentElement.dataset.theme = resolvedTheme;
        if (resolvedTheme === "dark") {
          document.documentElement.classList.add("dark");
        } else {
          document.querySelector('meta[name="theme-color"]').setAttribute("content", "#F3F6F8");
        }
      } catch (e) {
        document.documentElement.dataset.theme = "dark";
        document.documentElement.classList.add("dark");
      }
    </script>
