<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>محاكي الموبايل — AOI</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; gap: 12px;
    padding: 14px 12px 20px;
    background: radial-gradient(circle at 50% -20%, #16283a, #0a1420 60%);
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif; color: #e8eef4;
  }
  header { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center; }
  h1 { margin: 0; font-size: 15px; font-weight: 700; }
  h1 i { color: #fcc107; font-style: normal; }
  .actions { display: flex; gap: 6px; }
  .actions button, .actions a {
    border: 1px solid rgba(255,255,255,.16); background: rgba(255,255,255,.05);
    color: #e8eef4; font: 600 12.5px/1 system-ui; padding: 9px 14px;
    border-radius: 999px; cursor: pointer; text-decoration: none;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .stage { flex: 1; display: grid; place-items: center; width: 100%; }
  .phone {
    position: relative; width: 404px; height: 872px; max-width: 100%;
    border-radius: 48px; padding: 7px;
    background: linear-gradient(160deg, #2a3644, #10161e 70%);
    box-shadow: 0 30px 80px rgba(0,0,0,.55), inset 0 0 0 2px rgba(255,255,255,.06);
    transform-origin: top center;
  }
  .phone::before {
    content: ""; position: absolute; top: 16px; left: 50%; translate: -50% 0;
    width: 108px; height: 26px; border-radius: 16px; background: #05080c; z-index: 5;
  }
  .phone iframe {
    width: 390px; height: 858px; max-width: 100%; border: 0;
    border-radius: 42px; background: #0b1622; display: block;
  }
</style>
</head>
<body>
  <header>
    <h1>📱 محاكي الموبايل — <i>AOI</i></h1>
    <div class="actions">
      <button id="reload" type="button">⟳ تحديث</button>
      <a href="./index.html" target="_blank" rel="noopener">فتح عادي ↗</a>
    </div>
  </header>
  <div class="stage">
    <div class="phone">
      <iframe id="screen" src="./index.html" allow="camera; geolocation; fullscreen" title="نظام الحضور"></iframe>
    </div>
  </div>
<script>
  document.getElementById("reload").addEventListener("click", () => {
    const f = document.getElementById("screen");
    f.src = f.src;
  });
  const phone = document.querySelector(".phone");
  function fit() {
    const available = window.innerHeight - 96;
    const scale = Math.min(1, available / 872);
    phone.style.transform = "scale(" + scale + ")";
    phone.parentElement.style.height = (872 * scale) + "px";
  }
  fit();
  window.addEventListener("resize", fit);
</script>
</body>
</html>
